<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">

  <!-- IMPORTANT pour mobile / Snapchat -->
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

  <title>Lecteur MP3</title>

  <style>
    body {
      margin: 0;
      padding: 20px;
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    .container {
      max-width: 500px;
      margin: auto;
      background: #1e1e1e;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    h2 {
      margin-bottom: 20px;
    }

    audio {
      width: 100%;
      height: 40px;
    }

    /* Boutons fallback (si audio bug dans Snap) */
    .controls {
      margin-top: 15px;
    }

    button {
      background: #fffc00;
      border: none;
      padding: 12px 20px;
      margin: 5px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.8;
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>🎧 Lecture audio</h2>

    <!-- Lecteur principal -->
    <audio id="player" controls>
      <source src="musique.mp3" type="audio/mpeg">
      Ton navigateur ne supporte pas l'audio.
    </audio>

    <!-- Fallback boutons (au cas où Snap casse le player) -->
    <div class="controls">
      <button onclick="player.play()">▶️ Play</button>
      <button onclick="player.pause()">⏸ Pause</button>
    </div>
  </div>

  <script>
    const player = document.getElementById("player");
  </script>

</body>
</html>
