<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lecteur Audio SNT</title>
  <style>
    body { background: #111; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
    .card { background: #1e1e1e; padding: 25px; border-radius: 20px; width: 90%; max-width: 350px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    
    h2 { color: #fffc00; margin-bottom: 5px; }
    .file-name { color: #888; font-size: 14px; margin-bottom: 20px; }

    /* Barre de progression */
    .progress-container { background: #444; height: 8px; border-radius: 4px; margin: 20px 0; cursor: pointer; position: relative; }
    .progress-fill { background: #fffc00; height: 100%; width: 0%; border-radius: 4px; transition: width 0.1s linear; }

    /* Boutons */
    .btns { display: flex; justify-content: center; gap: 15px; }
    button { 
      background: #fffc00; border: none; padding: 12px 25px; 
      border-radius: 50px; font-weight: bold; cursor: pointer; 
      font-size: 16px; min-width: 100px;
    }
    button:active { transform: scale(0.95); }

    #timer { font-size: 12px; color: #888; margin-top: 5px; display: flex; justify-content: space-between; }
    #status { margin-top: 15px; font-size: 13px; color: #fffc00; min-height: 1.2em; }
  </style>
</head>
<body>

<div class="card">
  <h2>🎧 Lecteur Audio</h2>
  <div class="file-name">audio/son1.mp3</div>

  <audio id="audio">
    <source src="audio/son1.mp3" type="audio/mpeg">
  </audio>

  <div class="progress-container" onclick="seek(event)">
    <div class="progress-fill" id="fill"></div>
  </div>
  <div id="timer">
    <span id="current">0:00</span>
    <span id="total">0:00</span>
  </div>

  <div class="btns">
    <button onclick="play()">PLAY</button>
    <button onclick="pause()" style="background:none; border:2px solid #fffc00; color:#fffc00;">PAUSE</button>
  </div>

  <div id="status">En attente...</div>
</div>

<script>
  const audio = document.getElementById('audio');
  const fill = document.getElementById('fill');
  const status = document.getElementById('status');
  const currentEl = document.getElementById('current');
  const totalEl = document.getElementById('total');

  // --- Fonctions de base ---
  function play() {
    audio.play().then(() => {
      status.innerText = "▶ Lecture en cours";
    }).catch(err => {
      status.innerText = "⚠️ Erreur : " + err.message;
    });
  }

  function pause() {
    audio.pause();
    status.innerText = "⏸ Pause";
  }

  // --- Mise à jour barre et temps ---
  audio.ontimeupdate = () => {
    const pct = (audio.currentTime / audio.duration) * 100;
    fill.style.width = pct + "%";
    currentEl.innerText = formatTime(audio.currentTime);
  };

  audio.onloadedmetadata = () => {
    totalEl.innerText = formatTime(audio.duration);
    status.innerText = "Prêt à lire";
  };

  function seek(e) {
    const width = e.currentTarget.clientWidth;
    const clickX = e.offsetX;
    audio.currentTime = (clickX / width) * audio.duration;
  }

  function formatTime(sec) {
    let m = Math.floor(sec / 60);
    let s = Math.floor(sec % 60);
    return m + ":" + (s < 10 ? "0" + s : s);
  }

  // Si le fichier est introuvable
  audio.onerror = () => {
    status.innerText = "❌ Fichier audio/son1.mp3 introuvable !";
    status.style.color = "red";
  };
</script>

</body>
</html>
