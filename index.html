<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Lecteur Premium SNT</title>
  <style>
    :root {
      --primary: #fffc00; /* Jaune Snapchat/SNT */
      --bg: #0f0f0f;
      --card: #1a1a1a;
      --text: #ffffff;
    }

    body {
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-color: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    .player-card {
      width: 90%;
      max-width: 380px;
      background: var(--card);
      padding: 30px;
      border-radius: 30px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.6);
      border: 1px solid #333;
      text-align: center;
    }

    h2 {
      margin: 0 0 5px 0;
      font-size: 1.4rem;
      letter-spacing: 1px;
    }

    p {
      color: #888;
      font-size: 0.9rem;
      margin-bottom: 25px;
    }

    /* --- Barre de progression personnalisée --- */
    .progress-container {
      width: 100%;
      height: 6px;
      background: #333;
      border-radius: 10px;
      margin-bottom: 10px;
      cursor: pointer;
      position: relative;
    }

    .progress-bar {
      width: 0%;
      height: 100%;
      background: var(--primary);
      border-radius: 10px;
      transition: width 0.1s linear;
      box-shadow: 0 0 10px rgba(255, 252, 0, 0.4);
    }

    .time-info {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      color: #aaa;
      margin-bottom: 25px;
    }

    /* --- Boutons --- */
    .controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
    }

    .btn {
      border: none;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-play {
      width: 70px;
      height: 70px;
      background: var(--primary);
      color: black;
      font-size: 1.5rem;
      box-shadow: 0 5px 15px rgba(255, 252, 0, 0.3);
    }

    .btn-play:active { transform: scale(0.9); }

    #status {
      margin-top: 20px;
      font-size: 0.8rem;
      color: var(--primary);
      height: 1em;
    }
  </style>
</head>
<body>

  <div class="player-card">
    <h2>Lecture Audio</h2>
    <p>son1.mp3</p>

    <audio id="audio-player">
      <source src="audio/son1.mp3" type="audio/mpeg">
    </audio>

    <div class="progress-container" id="progress-wrapper">
      <div class="progress-bar" id="progress-fill"></div>
    </div>
    
    <div class="time-info">
      <span id="current-time">0:00</span>
      <span id="duration">0:00</span>
    </div>

    <div class="controls">
      <button class="btn btn-play" id="play-btn">▶</button>
    </div>

    <div id="status"></div>
  </div>

  <script>
    const audio = document.getElementById('audio-player');
    const playBtn = document.getElementById('play-btn');
    const progressWrapper = document.getElementById('progress-wrapper');
    const progressFill = document.getElementById('progress-fill');
    const currentTimeEl = document.getElementById('current-time');
    const durationEl = document.getElementById('duration');
    const status = document.getElementById('status');

    let isPlaying = false;

    // Basculer entre Play et Pause
    function togglePlay() {
      if (isPlaying) {
        audio.pause();
        playBtn.innerHTML = "▶";
      } else {
        audio.play().catch(e => {
          status.innerText = "Erreur : Cliquez à nouveau";
        });
        playBtn.innerHTML = "⏸";
      }
      isPlaying = !isPlaying;
    }

    playBtn.addEventListener('click', togglePlay);

    // Mettre à jour la barre de progression
    audio.addEventListener('timeupdate', () => {
      const { duration, currentTime } = audio;
      const progressPercent = (currentTime / duration) * 100;
      progressFill.style.width = `${progressPercent}%`;

      // Formatage du temps
      currentTimeEl.innerText = formatTime(currentTime);
    });

    // Charger la durée totale dès que possible
    audio.addEventListener('loadedmetadata', () => {
      durationEl.innerText = formatTime(audio.duration);
    });

    // Permettre de cliquer sur la barre pour changer de moment
    progressWrapper.addEventListener('click', (e) => {
      const width = progressWrapper.clientWidth;
      const clickX = e.offsetX;
      const duration = audio.duration;
      audio.currentTime = (clickX / width) * duration;
    });

    // Utitaire : Transformer secondes en 0:00
    function formatTime(time) {
      const min = Math.floor(time / 60);
      const sec = Math.floor(time % 60);
      return `${min}:${sec < 10 ? '0' + sec : sec}`;
    }

    // Gestion d'erreur (404)
    audio.addEventListener('error', () => {
      status.innerText = "Fichier audio introuvable";
      status.style.color = "red";
    });

    // Reset à la fin
    audio.addEventListener('ended', () => {
      isPlaying = false;
      playBtn.innerHTML = "▶";
      progressFill.style.width = '0%';
    });
  </script>

</body>
</html>
