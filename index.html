<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lecteur Audio Interactif</title>
  <style>
    :root {
      --primary: #fffc00;
      --bg: #111;
      --card: #1e1e1e;
    }

    body {
      background: var(--bg);
      color: white;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    .player-card {
      background: var(--card);
      padding: 30px;
      border-radius: 25px;
      width: 320px;
      text-align: center;
      box-shadow: 0 15px 35px rgba(0,0,0,0.7);
    }

    h2 { margin: 0 0 10px 0; font-size: 1.2rem; }
    .file-info { color: #888; font-size: 0.8rem; margin-bottom: 25px; }

    /* --- LA BARRE DE PROGRESSION (INPUT RANGE) --- */
    .seek-bar {
      width: 100%;
      cursor: pointer;
      accent-color: var(--primary); /* Couleur du bouton sur navigateurs modernes */
      margin-bottom: 10px;
    }

    /* Styles pour personnaliser le curseur sur différents navigateurs */
    input[type="range"] {
      -webkit-appearance: none;
      height: 6px;
      background: #444;
      border-radius: 5px;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      height: 18px;
      width: 18px;
      border-radius: 50%;
      background: var(--primary);
      box-shadow: 0 0 10px rgba(255, 252, 0, 0.5);
      cursor: grab;
    }

    input[type="range"]::-webkit-slider-thumb:active { cursor: grabbing; }

    .time-display {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      color: #aaa;
      margin-bottom: 25px;
    }

    /* --- BOUTONS --- */
    .controls { display: flex; justify-content: center; gap: 15px; }
    
    .btn {
      padding: 12px 25px;
      border-radius: 50px;
      border: none;
      font-weight: bold;
      cursor: pointer;
      font-size: 14px;
      transition: 0.2s;
    }

    .btn-play { background: var(--primary); color: black; }
    .btn-pause { background: transparent; border: 2px solid var(--primary); color: var(--primary); }
    .btn:active { transform: scale(0.9); }

    #status { margin-top: 20px; font-size: 12px; color: var(--primary); min-height: 1.2em; }
  </style>
</head>
<body>

<div class="player-card">
  <h2>🎧 Lecteur SNT</h2>
  <div class="file-info">audio/son1.mp3</div>

  <audio id="audio" preload="metadata">
    <source src="audio/son1.mp3" type="audio/mpeg">
  </audio>

  <input type="range" id="seek-bar" class="seek-bar" value="0" step="0.1">
  
  <div class="time-display">
    <span id="current-time">0:00</span>
    <span id="total-duration">0:00</span>
  </div>

  <div class="controls">
    <button class="btn btn-play" onclick="playAudio()">PLAY</button>
    <button class="btn btn-pause" onclick="pauseAudio()">PAUSE</button>
  </div>

  <div id="status">Prêt</div>
</div>

<script>
  const audio = document.getElementById('audio');
  const seekBar = document.getElementById('seek-bar');
  const currentTimeTxt = document.getElementById('current-time');
  const totalDurationTxt = document.getElementById('total-duration');
  const status = document.getElementById('status');

  // 1. Charger la durée quand le fichier est prêt
  audio.onloadedmetadata = () => {
    seekBar.max = audio.duration;
    totalDurationTxt.innerText = formatTime(audio.duration);
  };

  // 2. Mettre à jour la barre pendant la lecture
  audio.ontimeupdate = () => {
    if (!audio.paused) { // On ne met à jour que si on ne fait pas glisser
      seekBar.value = audio.currentTime;
      currentTimeTxt.innerText = formatTime(audio.currentTime);
    }
  };

  // 3. Déplacer le son quand on manipule la barre (glisser/cliquer)
  seekBar.oninput = () => {
    audio.currentTime = seekBar.value;
    currentTimeTxt.innerText = formatTime(seekBar.value);
  };

  function playAudio() {
    audio.play().then(() => {
      status.innerText = "Lecture en cours...";
    }).catch(e => {
      status.innerText = "Erreur : Cliquez à nouveau";
    });
  }

  function pauseAudio() {
    audio.pause();
    status.innerText = "Pause";
  }

  function formatTime(sec) {
    let m = Math.floor(sec / 60);
    let s = Math.floor(sec % 60);
    return m + ":" + (s < 10 ? "0" + s : s);
  }

  audio.onerror = () => {
    status.innerText = "❌ Fichier audio/son1.mp3 absent !";
    status.style.color = "#ff4444";
  };
</script>

</body>
</html>
