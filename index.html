<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Lecteur MP3</title>
  <style>
    body { margin: 0; padding: 20px; background: #111; color: white; font-family: Arial, sans-serif; text-align: center; }
    .container { max-width: 500px; margin: auto; background: #1e1e1e; padding: 20px; border-radius: 12px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
    h2 { margin-bottom: 20px; }
    audio { width: 100%; height: 40px; margin-bottom: 10px; }
    .controls { margin-top: 15px; }
    button { background: #fffc00; border: none; padding: 12px 20px; margin: 5px; border-radius: 8px; font-size: 16px; cursor: pointer; color: black; font-weight: bold; }
    button:hover { opacity: 0.8; }
    #status { font-size: 12px; color: #888; margin-top: 10px; }
  </style>
</head>
<body>

  <div class="container">
    <h2>🎧 Lecture audio</h2>

    <audio id="player" controls>
      Ton navigateur ne supporte pas l'audio.
    </audio>

    <div class="controls">
      <button onclick="playAudio()">▶️ Play</button>
      <button onclick="pauseAudio()">⏸ Pause</button>
    </div>
    
    <div id="status">Chargement...</div>
  </div>

  <script>
    const player = document.getElementById("player");
    const statusDiv = document.getElementById("status");

    // 1. Récupérer le nom du fichier dans l'URL (ex: ?file=son1.mp3)
    const urlParams = new URLSearchParams(window.location.search);
    const fileName = urlParams.get('file') || 'son1.mp3'; // 'son1.mp3' par défaut

    // 2. Construire le chemin vers le dossier /audio
    // Si ton dossier "audio" est à la racine de ton site :
    player.src = "audio/" + fileName;

    // 3. Fonctions de lecture sécurisées
    async function playAudio() {
      try {
        statusDiv.innerText = "Lecture en cours...";
        await player.play();
      } catch (err) {
        console.log("Erreur de lecture : ", err);
        statusDiv.innerText = "Erreur : Cliquez à nouveau sur Play";
      }
    }

    function pauseAudio() {
      player.pause();
      statusDiv.innerText = "Pause";
    }

    // Vérifier si le fichier charge bien
    player.onerror = () => {
      statusDiv.innerText = "Erreur : Fichier " + fileName + " introuvable dans /audio";
      statusDiv.style.color = "red";
    };
  </script>

</body>
</html>
